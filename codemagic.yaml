# ParsecMobile (OpenParsec) — Codemagic iOS nativo (Swift)
# Firma: fetch-signing-files --create (NO usar ios_signing en environment;
# ese bloque exige perfiles pre-subidos en Team settings y falla al iniciar).
# IMPORTANTE: workflow "iOS → TestFlight (manual)" — NO Default Workflow.

definitions:
  env_common: &env_common
    xcode: latest
    vars:
      BUNDLE_ID: com.aigch.OpenParsec1
      XCODE_PROJECT: OpenParsec.xcodeproj
      XCODE_SCHEME: OpenParsec
      APP_STORE_APPLE_ID: "6780047101"

  ios_scripts: &ios_scripts
    - name: Repositorio — submódulos (ParsecSDK)
      script: |
        set -e
        git submodule update --init --recursive
        test -d Frameworks/ParsecSDK.framework || {
          echo "ERROR: Frameworks/ParsecSDK.framework no encontrado tras init del submódulo"
          exit 1
        }
    - name: iOS — analyze
      script: |
        set -e
        xcodebuild analyze \
          -project "$XCODE_PROJECT" \
          -scheme "$XCODE_SCHEME" \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || exit ${PIPESTATUS[0]}
    - name: iOS — certificados y perfiles (App Store)
      script: |
        set -e
        if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
          echo "ERROR: Falta CERTIFICATE_PRIVATE_KEY en el grupo parcec (Codemagic → Environment variables → Secret)"
          echo "Ver docs/CODEMAGIC.md seccion Certificado de distribucion"
          exit 1
        fi
        keychain initialize
        app-store-connect fetch-signing-files "$BUNDLE_ID" \
          --type IOS_APP_STORE \
          --create \
          --strict-match-identifier \
          --certificate-key=@env:CERTIFICATE_PRIVATE_KEY
    - name: iOS — code signing
      script: |
        set -e
        xcode-project use-profiles \
          --project "$CM_BUILD_DIR/$XCODE_PROJECT"
    - name: iOS — build number TestFlight
      script: |
        set -e
        if [ -z "${APP_STORE_APPLE_ID:-}" ]; then
          echo "Sin APP_STORE_APPLE_ID: se usa build del proyecto (1.0.0+1)"
          exit 0
        fi
        LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" || echo 0)
        agvtool new-version -all $(($LATEST + 1))
    - name: iOS — compilar IPA
      script: |
        set -e
        xcode-project build-ipa \
          --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
          --scheme "$XCODE_SCHEME"
        echo "=== Contenido build/ios/ipa ==="
        find build/ios/ipa -ls 2>/dev/null || find build -name '*.ipa' -ls
        IPA=$(find build/ios/ipa -name '*.ipa' -print -quit 2>/dev/null)
        if [ -z "$IPA" ]; then IPA=$(find build -name '*.ipa' -print -quit); fi
        if [ -z "$IPA" ]; then echo "ERROR: no se encontro IPA"; exit 1; fi
        echo "IPA: $IPA"
        mkdir -p "$CM_BUILD_DIR/artifacts/ios"
        cp "$IPA" "$CM_BUILD_DIR/artifacts/ios/app.ipa"
        ls -la "$CM_BUILD_DIR/artifacts/ios/"
    - name: iOS — subir a App Store Connect
      script: |
        set -e
        IPA="$CM_BUILD_DIR/artifacts/ios/app.ipa"
        test -f "$IPA"
        echo "Subiendo $IPA ($(du -h "$IPA" | cut -f1)) app=$APP_STORE_APPLE_ID"
        app-store-connect publish \
          --path "$IPA" \
          --apple-id "$APP_STORE_APPLE_ID"

workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 75
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: PARSEC
    environment:
      <<: *env_common
      groups:
        - parcec
    cache:
      cache_paths:
        - $HOME/Library/Developer/Xcode/DerivedData
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    when:
      changeset:
        includes:
          - 'OpenParsec/'
          - 'OpenParsec.xcodeproj/'
          - 'Frameworks/'
          - 'codemagic.yaml'
    scripts: *ios_scripts
    artifacts:
      - artifacts/ios/app.ipa
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false

  ios-testflight-manual:
    name: iOS → TestFlight (manual)
    max_build_duration: 75
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: PARSEC
    environment:
      <<: *env_common
      groups:
        - parcec
    scripts: *ios_scripts
    artifacts:
      - artifacts/ios/app.ipa
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false

  ios-adhoc-manual:
    name: iOS → IPA ad hoc (manual)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: PARSEC
    environment:
      <<: *env_common
      groups:
        - parcec
    scripts:
      - name: Repositorio — submódulos (ParsecSDK)
        script: |
          set -e
          git submodule update --init --recursive
          test -d Frameworks/ParsecSDK.framework
      - name: iOS — certificados y perfiles (ad hoc)
        script: |
          set -e
          if [ -z "${CERTIFICATE_PRIVATE_KEY:-}" ]; then
            echo "ERROR: Falta CERTIFICATE_PRIVATE_KEY en grupo parcec"
            exit 1
          fi
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --create \
            --strict-match-identifier \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY
      - name: iOS — code signing
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT"
      - name: iOS — compilar IPA ad hoc
        script: |
          set -e
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
