# ParsecMobile (OpenParsec) — Codemagic iOS nativo (Swift)
#
# FIRMA (obligatorio ANTES del primer build):
#   Team settings → Code signing identities
#   1. iOS certificates → Generate certificate → reference: parsec_distribution
#   2. iOS provisioning profiles → reference: parsec_appstore (ya descargado)
#      Bundle: com.aigch.OpenParsec1.757NQ675N5
#
# IMPORTANTE: workflow "iOS → TestFlight (manual)" — NO Default Workflow.

definitions:
  env_common: &env_common
    xcode: latest
    ios_signing:
      provisioning_profiles:
        - profile: parsec_appstore
      certificates:
        - certificate: parsec_distribution
    vars:
      BUNDLE_ID: com.aigch.OpenParsec1.757NQ675N5
      XCODE_PROJECT: OpenParsec.xcodeproj
      XCODE_SCHEME: OpenParsec
      APP_STORE_APPLE_ID: "6780047101"

  ios_scripts: &ios_scripts
    - name: Repositorio — submódulos (ParsecSDK)
      script: |
        set -e
        git submodule sync --recursive
        git submodule update --init --recursive --depth 1
        FW="Frameworks/ParsecSDK.framework"
        test -d "$FW" || { echo "ERROR: $FW no encontrado"; exit 1; }
        test -f "$FW/ParsecSDK" || { echo "ERROR: binario ParsecSDK ausente"; ls -laR "$FW"; exit 1; }
        echo "ParsecSDK OK: $(du -h "$FW/ParsecSDK" | cut -f1)"
        echo "Arquitecturas antes: $(lipo -info "$FW/ParsecSDK")"
        # App Store: solo arm64 dispositivo (rechaza x86_64 / simulador en el framework)
        if lipo -info "$FW/ParsecSDK" | grep -q x86_64; then
          if lipo -info "$FW/ParsecSDK" | grep -q arm64; then
            lipo -thin arm64 "$FW/ParsecSDK" -output "$FW/ParsecSDK.thin"
            mv "$FW/ParsecSDK.thin" "$FW/ParsecSDK"
          else
            echo "ERROR: ParsecSDK solo tiene x86_64 (simulador). Necesitas SDK con arm64."
            exit 1
          fi
        fi
        echo "Arquitecturas despues: $(lipo -info "$FW/ParsecSDK")"
        # ITMS-90208: MinimumOSVersion del framework debe >= minimo de la app (14.0)
        /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 14.0" "$FW/Info.plist"
        echo "ParsecSDK MinimumOSVersion: $(/usr/libexec/PlistBuddy -c 'Print :MinimumOSVersion' "$FW/Info.plist")"
    - name: iOS — analyze
      script: |
        set -e
        xcodebuild analyze \
          -project "$XCODE_PROJECT" \
          -scheme "$XCODE_SCHEME" \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || exit ${PIPESTATUS[0]}
    - name: iOS — code signing
      script: |
        set -e
        keychain initialize
        keychain add-certificates
        cd "$CM_BUILD_DIR"
        xcode-project use-profiles --project OpenParsec.xcodeproj
        echo "=== Signing (Release) ==="
        xcodebuild -project OpenParsec.xcodeproj -scheme OpenParsec -configuration Release \
          -destination 'generic/platform=iOS' -showBuildSettings 2>/dev/null \
          | grep -iE 'PRODUCT_BUNDLE_IDENTIFIER|CODE_SIGN|PROVISIONING|DEVELOPMENT_TEAM' || true
        FW="Frameworks/ParsecSDK.framework"
        if [ -n "${CM_CERTIFICATE_NAME:-}" ] && [ -f "$FW/ParsecSDK" ]; then
          echo "Firmando $FW con $CM_CERTIFICATE_NAME"
          codesign --force --sign "$CM_CERTIFICATE_NAME" --timestamp=none "$FW"
          codesign -vv "$FW"
          echo "Arquitectura final embebida: $(lipo -info "$FW/ParsecSDK")"
        else
          echo "WARN: CM_CERTIFICATE_NAME no definido"
        fi
    - name: iOS — build number TestFlight
      script: |
        set -e
        cd "$CM_BUILD_DIR"
        # TestFlight solo cuenta builds aceptados; App Store Connect cuenta todos los uploads (incluso rechazados)
        TF=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
        ASC=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || echo 0)
        LATEST=$TF
        if [ "$ASC" -gt "$LATEST" ]; then LATEST=$ASC; fi
        NEXT=$(($LATEST + 1))
        echo "Build number: ultimo=$LATEST (TF=$TF ASC=$ASC) -> nuevo=$NEXT"
        agvtool new-version -all "$NEXT"
        agvtool what-version -all
    - name: iOS — compilar IPA
      script: |
        set -e
        cd "$CM_BUILD_DIR"
        mkdir -p build/ios/ipa build/ios/xcarchive
        ARCHIVE="build/ios/xcarchive/OpenParsec.xcarchive"
        set +e
        xcodebuild \
          -project OpenParsec.xcodeproj \
          -scheme OpenParsec \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath "$ARCHIVE" \
          archive \
          COMPILER_INDEX_STORE_ENABLE=NO \
          2>&1 | tee /tmp/xcode-archive.log
        ARCHIVE_EXIT=${PIPESTATUS[0]}
        set -e
        if [ "$ARCHIVE_EXIT" -ne 0 ]; then
          echo "=== ERRORES ARCHIVE (ultimas 100 lineas) ==="
          tail -100 /tmp/xcode-archive.log
          grep -iE 'error:|failed|provision|sign' /tmp/xcode-archive.log | tail -30 || true
          exit "$ARCHIVE_EXIT"
        fi
        xcodebuild -exportArchive \
          -archivePath "$ARCHIVE" \
          -exportPath build/ios/ipa \
          -exportOptionsPlist /Users/builder/export_options.plist
        echo "=== Contenido build/ios/ipa ==="
        find build/ios/ipa -ls 2>/dev/null || find build -name '*.ipa' -ls
        IPA=$(find build/ios/ipa -name '*.ipa' -print -quit 2>/dev/null)
        if [ -z "$IPA" ]; then IPA=$(find build -name '*.ipa' -print -quit); fi
        if [ -z "$IPA" ]; then echo "ERROR: no se encontro IPA"; exit 1; fi
        echo "IPA: $IPA"
        mkdir -p "$CM_BUILD_DIR/artifacts/ios"
        cp "$IPA" "$CM_BUILD_DIR/artifacts/ios/app.ipa"
        ls -la "$CM_BUILD_DIR/artifacts/ios/"
    - name: iOS — subir a App Store Connect
      script: |
        set -e
        IPA="$CM_BUILD_DIR/artifacts/ios/app.ipa"
        test -f "$IPA"
        echo "Subiendo $IPA ($(du -h "$IPA" | cut -f1)) app=$APP_STORE_APPLE_ID"
        app-store-connect publish \
          --path "$IPA" \
          --apple-id "$APP_STORE_APPLE_ID"

workflows:
  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 75
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: PARSEC
    environment:
      <<: *env_common
    cache:
      cache_paths:
        - $HOME/Library/Developer/Xcode/DerivedData
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
      cancel_previous_builds: true
    when:
      changeset:
        includes:
          - 'OpenParsec/'
          - 'OpenParsec.xcodeproj/'
          - 'Frameworks/'
          - 'codemagic.yaml'
    scripts: *ios_scripts
    artifacts:
      - artifacts/ios/app.ipa
      - /tmp/xcode-archive.log
      - /tmp/xcodebuild_logs/*.log

  ios-testflight-manual:
    name: iOS → TestFlight (manual)
    max_build_duration: 75
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: PARSEC
    environment:
      <<: *env_common
    scripts: *ios_scripts
    artifacts:
      - artifacts/ios/app.ipa
      - /tmp/xcode-archive.log
      - /tmp/xcodebuild_logs/*.log

  ios-adhoc-manual:
    name: iOS → IPA ad hoc (manual)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: PARSEC
    environment:
      <<: *env_common
      ios_signing:
        provisioning_profiles:
          - profile: parsec_appstore
        certificates:
          - certificate: parsec_distribution
    scripts:
      - name: Repositorio — submódulos (ParsecSDK)
        script: |
          set -e
          git submodule update --init --recursive
          test -d Frameworks/ParsecSDK.framework
      - name: iOS — code signing
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT"
      - name: iOS — compilar IPA ad hoc
        script: |
          set -e
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
